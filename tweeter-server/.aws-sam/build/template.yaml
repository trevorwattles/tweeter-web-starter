AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Tweeter Server AWS SAM Template

  '
Globals:
  Function:
    Timeout: 30
    Runtime: nodejs22.x
    Architectures:
    - x86_64
    Layers:
    - Ref: NodeModulesLayer
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
Resources:
  TweeterApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: '''POST, GET, OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
        MaxAge: '''600'''
  NodeModulesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: tweeter-dependencies
      Description: Dependencies for tweeter lambdas
      ContentUri: ../../layer
      CompatibleRuntimes:
      - nodejs22.x
      RetentionPolicy: Retain
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users
      AttributeDefinitions:
      - AttributeName: alias
        AttributeType: S
      KeySchema:
      - AttributeName: alias
        KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 4
        WriteCapacityUnits: 4
  AuthTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: authTokens
      AttributeDefinitions:
      - AttributeName: token
        AttributeType: S
      KeySchema:
      - AttributeName: token
        KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 4
        WriteCapacityUnits: 4
  FollowsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: follows
      AttributeDefinitions:
      - AttributeName: follower_handle
        AttributeType: S
      - AttributeName: followee_handle
        AttributeType: S
      KeySchema:
      - AttributeName: follower_handle
        KeyType: HASH
      - AttributeName: followee_handle
        KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 4
        WriteCapacityUnits: 4
      GlobalSecondaryIndexes:
      - IndexName: follows_index
        KeySchema:
        - AttributeName: followee_handle
          KeyType: HASH
        - AttributeName: follower_handle
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
        ProvisionedThroughput:
          ReadCapacityUnits: 4
          WriteCapacityUnits: 4
  StoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: stories
      AttributeDefinitions:
      - AttributeName: sender_alias
        AttributeType: S
      - AttributeName: timestamp
        AttributeType: N
      KeySchema:
      - AttributeName: sender_alias
        KeyType: HASH
      - AttributeName: timestamp
        KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 4
        WriteCapacityUnits: 4
  FeedsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: feeds
      AttributeDefinitions:
      - AttributeName: receiver_alias
        AttributeType: S
      - AttributeName: timestamp
        AttributeType: N
      KeySchema:
      - AttributeName: receiver_alias
        KeyType: HASH
      - AttributeName: timestamp
        KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 4
        WriteCapacityUnits: 4
  GetFollowerCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowerCountFunction
      Handler: lambda/GetFollowerCountHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetFollowerCount:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follower/count
            Method: post
    Metadata:
      SamResourceId: GetFollowerCountFunction
  GetFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweeCountFunction
      Handler: lambda/GetFolloweeCountHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetFolloweeCount:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /followee/count
            Method: post
    Metadata:
      SamResourceId: GetFolloweeCountFunction
  GetFollowersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowersFunction
      Handler: lambda/GetFollowersHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetFollowers:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follower/list
            Method: post
    Metadata:
      SamResourceId: GetFollowersFunction
  GetFolloweesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweesFunction
      Handler: lambda/GetFolloweesHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetFollowees:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /followee/list
            Method: post
    Metadata:
      SamResourceId: GetFolloweesFunction
  GetIsFollowerStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetIsFollowerStatusFunction
      Handler: lambda/GetIsFollowerStatusHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetIsFollowerStatus:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follower/status
            Method: post
    Metadata:
      SamResourceId: GetIsFollowerStatusFunction
  FollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: FollowFunction
      Handler: lambda/FollowHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        Follow:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follow
            Method: post
    Metadata:
      SamResourceId: FollowFunction
  UnfollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UnfollowFunction
      Handler: lambda/UnfollowHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        Unfollow:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /unfollow
            Method: post
    Metadata:
      SamResourceId: UnfollowFunction
  PostStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PostStatusFunction
      Handler: lambda/PostStatusHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        PostStatus:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /status/post
            Method: post
    Metadata:
      SamResourceId: PostStatusFunction
  GetStoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetStoryFunction
      Handler: lambda/GetStoryHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetStory:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /story/list
            Method: post
    Metadata:
      SamResourceId: GetStoryFunction
  GetFeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFeedFunction
      Handler: lambda/GetFeedHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetFeed:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /feed/list
            Method: post
    Metadata:
      SamResourceId: GetFeedFunction
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LoginFunction
      Handler: lambda/LoginHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /auth/login
            Method: post
    Metadata:
      SamResourceId: LoginFunction
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RegisterFunction
      Handler: lambda/RegisterHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        Register:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /auth/register
            Method: post
    Metadata:
      SamResourceId: RegisterFunction
  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetUserFunction
      Handler: lambda/GetUserHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        GetUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /user/get
            Method: post
    Metadata:
      SamResourceId: GetUserFunction
  LogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LogoutFunction
      Handler: lambda/LogoutHandler.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AmazonS3FullAccess
      Events:
        Logout:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /auth/logout
            Method: post
    Metadata:
      SamResourceId: LogoutFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${TweeterApi}.execute-api.${AWS::Region}.amazonaws.com/dev/
