AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Tweeter Server AWS SAM Template

  '
Globals:
  Function:
    Timeout: 10
    Runtime: nodejs22.x
    Architectures:
    - x86_64
    Layers:
    - Ref: NodeModulesLayer
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
Resources:
  TweeterApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: '''POST, GET, OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
        MaxAge: '''600'''
  NodeModulesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: tweeter-dependencies
      Description: Dependencies for tweeter lambdas
      ContentUri: ../../layer
      CompatibleRuntimes:
      - nodejs22.x
      RetentionPolicy: Retain
  GetFollowerCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowerCountFunction
      Handler: lambda/GetFollowerCountHandler.handler
      Events:
        GetFollowerCount:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follower/count
            Method: post
    Metadata:
      SamResourceId: GetFollowerCountFunction
  GetFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweeCountFunction
      Handler: lambda/GetFolloweeCountHandler.handler
      Events:
        GetFolloweeCount:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /followee/count
            Method: post
    Metadata:
      SamResourceId: GetFolloweeCountFunction
  GetFollowersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowersFunction
      Handler: lambda/GetFollowersHandler.handler
      Events:
        GetFollowers:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follower/list
            Method: post
    Metadata:
      SamResourceId: GetFollowersFunction
  GetFolloweesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweesFunction
      Handler: lambda/GetFolloweesHandler.handler
      Events:
        GetFollowees:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /followee/list
            Method: post
    Metadata:
      SamResourceId: GetFolloweesFunction
  GetIsFollowerStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetIsFollowerStatusFunction
      Handler: lambda/GetIsFollowerStatusHandler.handler
      Events:
        GetIsFollowerStatus:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follower/status
            Method: post
    Metadata:
      SamResourceId: GetIsFollowerStatusFunction
  FollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: FollowFunction
      Handler: lambda/FollowHandler.handler
      Events:
        Follow:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /follow
            Method: post
    Metadata:
      SamResourceId: FollowFunction
  UnfollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UnfollowFunction
      Handler: lambda/UnfollowHandler.handler
      Events:
        Unfollow:
          Type: Api
          Properties:
            RestApiId:
              Ref: TweeterApi
            Path: /unfollow
            Method: post
    Metadata:
      SamResourceId: UnfollowFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${TweeterApi}.execute-api.${AWS::Region}.amazonaws.com/dev/
