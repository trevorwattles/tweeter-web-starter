AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Tweeter Server AWS SAM Template

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Layers:
      - !Ref NodeModulesLayer
    Environment:
      Variables:
        NODE_OPTIONS: "--enable-source-maps"

Resources:

  # API Gateway
  TweeterApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: "'POST, GET, OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"

  # Dependencies Layer
  NodeModulesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: tweeter-dependencies
      Description: Dependencies for tweeter lambdas
      ContentUri: layer/
      CompatibleRuntimes:
        - nodejs22.x
      RetentionPolicy: Retain

  # Lambdas
  GetFollowerCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/GetFollowerCountHandler.handler
      Events:
        GetFollowerCount:
          Type: Api
          Properties:
            RestApiId: !Ref TweeterApi
            Path: /follower/count
            Method: post

  GetFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/GetFolloweeCountHandler.handler
      Events:
        GetFolloweeCount:
          Type: Api
          Properties:
            RestApiId: !Ref TweeterApi
            Path: /followee/count
            Method: post

  GetFollowersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/GetFollowersHandler.handler
      Events:
        GetFollowers:
          Type: Api
          Properties:
            RestApiId: !Ref TweeterApi
            Path: /follower/list
            Method: post

  GetFolloweesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/GetFolloweesHandler.handler
      Events:
        GetFollowees:
          Type: Api
          Properties:
            RestApiId: !Ref TweeterApi
            Path: /followee/list
            Method: post

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${TweeterApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"
